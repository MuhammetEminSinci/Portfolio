<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>SinciShop</title>
  <link rel="stylesheet" href="e-commerce-style.css" />
  <link href="https://fonts.googleapis.com/css2?family=Poppins&display=swap" rel="stylesheet" />
</head>
<body>
  <header>
    <h1>SinciShop</h1>
    <button id="menu-toggle" aria-label="Mobil Menü Aç/Kapa">☰</button>
    <nav id="nav-menu" class="hidden" aria-label="Ana Menü">
      <select id="category-filter" aria-label="Kategori Filtrele">
        <option value="all">Tüm Kategoriler</option>
        <option value="Elektronik">Elektronik</option>
        <option value="Bilgisayar">Bilgisayar</option>
        <option value="Aksesuar">Aksesuar</option>
      </select>
      <input type="text" id="search-input" placeholder="Ürün ara..." aria-label="Ürün arama kutusu" />
      <button id="dark-mode-toggle" aria-pressed="false">Karanlık Mod</button>
    </nav>
    <div class="cart" tabindex="0" role="button" aria-label="Sepet, tıklayınca açılır">
      🛒 Sepet <span id="cart-count" aria-live="polite">0</span>
    </div>
  </header>

  <main>
    <section id="products" class="product-grid" aria-live="polite"></section>
  </main>

  <aside id="cart-modal" class="cart-modal hidden" aria-modal="true" role="dialog" aria-labelledby="cart-title" tabindex="-1">
    <h2 id="cart-title">Sepet</h2>
    <ul id="cart-items"></ul>
    <p>Toplam: <span id="total-price">₺0</span></p>
    <div class="cart-actions">
      <button id="clear-cart-btn">Sepeti Temizle</button>
      <button id="checkout-btn">Ödeme Yap</button>
    </div>
  </aside>

  <div id="checkout-modal" class="product-modal hidden" aria-modal="true" role="dialog" aria-labelledby="checkout-title" tabindex="-1">
    <div class="modal-content">
      <button id="close-checkout" class="close" aria-label="Ödeme ekranını kapat">&times;</button>
      <h2 id="checkout-title">Ödeme Ekranı</h2>
      <form id="checkout-form">
        <label for="name">İsim:</label>
        <input type="text" id="name" required />

        <label for="card-number">Kredi Kartı Numarası:</label>
        <input type="text" id="card-number" maxlength="16" minlength="16" pattern="\d{16}" required />

        <label for="expiry">Son Kullanma Tarihi:</label>
        <input type="month" id="expiry" required />

        <label for="cvv">CVV:</label>
        <input type="text" id="cvv" maxlength="3" minlength="3" pattern="\d{3}" required />

        <button type="submit">Ödemeyi Tamamla</button>
      </form>
      <p id="payment-message" class="hidden" role="alert"></p>
    </div>
  </div>

  <div id="product-modal" class="product-modal hidden" aria-modal="true" role="dialog" aria-labelledby="product-title" tabindex="-1">
    <div class="modal-content">
      <button id="close-modal" class="close" aria-label="Ürün detaylarını kapat">&times;</button>
      <img id="modal-image" src="" alt="" />
      <h3 id="product-title"></h3>
      <p id="modal-price"></p>
      <p id="modal-description"></p>
    </div>
  </div>

  <script src="e-commerce-script.js"></script>
</body>
</html>
